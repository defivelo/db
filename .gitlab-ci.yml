include:
  - component: $CI_SERVER_FQDN/components/containers-builder/build@0.8.0
    inputs:
      as: "Build image"
      allow_failure: false
  - component: $CI_SERVER_FQDN/components/containers-builder/tags-delete@0.8.0
    inputs:
      as: "Unpush built image"
      stage: build
      image-tags: $CI_COMMIT_REF_SLUG
      needs:
        - job: "Build image"
          artifacts: false
      rules:
        - when: always

stages:
  - test
  - build

test:
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - docker-nonswiss-ok
  image: &test_image 'python:3.11-bullseye'
  services:
    - name: postgres:15
      alias: db
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    DJANGO_SETTINGS_MODULE: defivelo.settings.test
    DATABASE_URL: postgresql://postgres:postgres@db/postgres
    POSTGRES_PASSWORD: postgres
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key: *test_image
    paths:
      - .cache/pip
  before_script:
    - apt-get update; apt-get --no-install-recommends -y install sassc
  script:
    - pip install -r requirements/test.txt
    - |
      bash -c "
        echo -n 'Wait until the PostgreSQL server is ready .'
        while ! (echo > /dev/tcp/db/5432) >/dev/null 2>&1; do
          echo -n '.'
          sleep 1
        done
        echo ' Ready!'
      "
    - ./scripts/run_tests.sh
